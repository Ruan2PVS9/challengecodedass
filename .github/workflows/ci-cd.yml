name: CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      run_migrations:
        description: 'Run Prisma migrations after build'
        required: false
        default: 'false'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image names
        run: |
          echo "BACKEND_IMAGE=ruanpvs/challengecodedass-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ruanpvs/challengecodedass-frontend" >> "$GITHUB_ENV"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  migrate:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_migrations == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend
      - name: Run Prisma migrations (deploy)
        run: npx prisma migrate deploy --schema=./prisma/schema.prisma
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

