version: "3.8"
services:
  frontend:
    image: ruanpvs/challengecodedass-frontend:latest
    ports:
      - "80:80"
    restart: always
  backend:
    image: ruanpvs/challengecodedass-backend:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - db
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    volumes:
      - dbdata:/var/lib/postgresql/data
volumes:
  dbdata:
